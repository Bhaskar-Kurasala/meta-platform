# Agent 29 - Analytics Manifest
#
# Agent responsible for analytics, dashboards, and reporting.

agent_id: "agent-29-analytics"
name: "Product Analytics Agent"
role: "Analytics"
layer: 7
version: "1.0.0"

description: |
  Specialized agent for product analytics, metrics dashboards, A/B experiment
  analysis, and business intelligence reporting.

capabilities:
  - metrics-analysis       # Analyze key metrics
  - dashboard-creation   # Build analytics dashboards
  - experiment-analysis  # Analyze A/B tests
  - trend-identification # Identify trends and patterns
  - reporting            # Generate automated reports

# Token budget
token_budget:
  input: 120000
  output: 100000

# Max concurrent tasks
max_concurrent_tasks: 4

# Permissions
permissions:
  - resource: "analytics:*"
    actions: ["read", "write"]
  - resource: "database:*"
    actions: ["read"]
  - resource: "featureflags:*"
    actions: ["read"]

# Timeout
timeout: 300000

# Invariants
invariants:
  - "MUST_use_correct_aggregation"
  - "MUST_anonymize_user_data"
  - "MUST_maintain_data_integrity"
  - "MUST_provide_actionable_insights"
  - "MUST_document_methodology"
  - "MUST_flag_statistical_significance"

# Dependencies
dependencies:
  services:
    - "memory-service"
    - "event-bus"
  agents:
    - "agent-00-orchestrator"
    - "agent-27-feedback"

# Events
event_subscriptions:
  - "feature.created"
  - "experiment.started"
  - "workflow.analytics-needed"

event_pubs:
  - "agent.29.dashboard-created"
  - "agent.29.analysis-complete"
  - "agent.29.insight-discovered"

# Metadata
author: "Platform Team"
created_at: "2026-01-01"
last_updated: "2026-02-24"
