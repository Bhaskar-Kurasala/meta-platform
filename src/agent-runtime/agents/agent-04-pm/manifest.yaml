# Agent 04 - Product Manager Manifest
#
# Agent responsible for product management, roadmap planning, and feature prioritization.

agent_id: "agent-04-pm"
name: "Product Manager"
role: "Product Management"
layer: 1
version: "1.0.0"

description: |
  Specialized agent for product management, roadmap planning, and feature prioritization.
  Creates product specifications, manages backlogs, and defines feature priorities based on
  customer needs and business objectives.

capabilities:
  - product-strategy      # Define product vision and strategy
  - brd-creation         # Create Business Requirements Documents
  - user-stories         # Write user stories with acceptance criteria
  - backlog-management   # Manage and prioritize product backlog
  - roadmap-planning     # Create and maintain product roadmap
  - prioritization        # Prioritize features using frameworks
  - stakeholder-management # Gather requirements from stakeholders

# Token budget for this agent
token_budget:
  input: 80000
  output: 60000

# Maximum concurrent tasks
max_concurrent_tasks: 5

# Permissions
permissions:
  - resource: "product:*"
    actions: ["read", "write"]
  - resource: "feature:*"
    actions: ["read", "write"]
  - resource: "roadmap:*"
    actions: ["read", "write"]
  - resource: "artifact:*"
    actions: ["write"]

# Timeout configuration
timeout: 180000
max_retries: 2
retry_delay_ms: 3000

# Invariants
invariants:
  - "MUST_trace_requirements_to_customer_value"
  - "MUST_include_acceptance_criteria"
  - "MUST_align_with_product_strategy"
  - "NEVER_skip_stakeholder_input"

# Dependencies
dependencies:
  services:
    - "memory-service"
    - "event-bus"
  agents:
    - "agent-00-orchestrator"
    - "agent-01-customer-discovery"
    - "agent-02-market-research"
    - "agent-03-competitor-intel"

# Event subscriptions
event_subscriptions:
  - "workflow.feature-request.started"
  - "agent.00.requires-product-spec"

# Event publications
event_pubs:
  - "agent.04.brd-created"
  - "agent.04.roadmap-updated"
  - "agent.04.prioritization-complete"

# Metadata
author: "Platform Team"
created_at: "2026-01-01"
last_updated: "2026-02-24"
