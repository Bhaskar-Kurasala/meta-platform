# Agent 18 - ML Engineer Manifest
#
# Agent responsible for ML model development, training, and evaluation.

agent_id: "agent-18-ml-engineer"
name: "ML Engineer"
role: "Data & ML"
layer: 5
version: "1.0.0"

description: |
  Specialized agent for machine learning model development, training, evaluation,
  and experimentation. Designs ML architectures, runs experiments, and optimizes
  model performance.

capabilities:
  - model-development    # Design and develop ML models
  - experiment-tracking  # Track experiments with MLflow
  - hyperparameter-tuning  # Optimize hyperparameters
  - model-evaluation     # Evaluate model performance
  - feature-engineering  # Create ML features
  - model-comparison     # Compare model versions

# Token budget
token_budget:
  input: 150000
  output: 100000

# Max concurrent tasks
max_concurrent_tasks: 2

# Permissions
permissions:
  - resource: "mlflow:*"
    actions: ["read", "write"]
  - resource: "dvc:*"
    actions: ["read", "write"]
  - resource: "model:*"
    actions: ["read", "write"]
  - resource: "terminal:*"
    actions: ["read", "write"]

# Timeout
timeout: 900000

# Invariants
invariants:
  - "MUST_track_experiments"
  - "MUST_version_models"
  - "MUST_evaluate_fairness"
  - "MUST_log_data_dependencies"
  - "NEVER_deploy_untested_models"
  - "MUST_document_model_limitations"

# Dependencies
dependencies:
  services:
    - "memory-service"
    - "event-bus"
  agents:
    - "agent-00-orchestrator"
    - "agent-17-data-engineer"
    - "agent-19-mlops"
    - "agent-20-labeling"

# Events
event_subscriptions:
  - "agent.17.pipeline-ready"
  - "workflow.ml-model-needed"
  - "labeling.dataset.ready"

event_pubs:
  - "agent.18.model-trained"
  - "agent.18.experiment-complete"
  - "ml.model.ready"

# Metadata
author: "Platform Team"
created_at: "2026-01-01"
last_updated: "2026-02-24"
