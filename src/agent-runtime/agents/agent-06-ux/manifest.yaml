# Agent 06 - UX Designer Manifest
#
# Agent responsible for user experience design, wireframes, and usability.

agent_id: "agent-06-ux"
name: "UX Designer"
role: "User Experience"
layer: 2
version: "1.0.0"

description: |
  Specialized agent for user experience design, wireframing, and usability optimization.
  Creates user journeys, designs interfaces, and ensures accessibility standards.

capabilities:
  - user-journey-mapping   # Map user journeys
  - wireframe-design      # Create wireframes
  - ui-design            # Design user interfaces
  - accessibility-review  # Ensure accessibility compliance
  - usability-testing    # Plan and analyze usability tests
  - design-system        # Maintain design system

# Token budget
token_budget:
  input: 80000
  output: 60000

# Max concurrent tasks
max_concurrent_tasks: 5

# Permissions
permissions:
  - resource: "design:*"
    actions: ["read", "write"]
  - resource: "wireframe:*"
    actions: ["read", "write"]
  - resource: "artifact:*"
    actions: ["write"]

# Timeout
timeout: 180000

# Invariants
invariants:
  - "MUST_follow_accessibility_standards"
  - "MUST_validate_with_user_research"
  - "MUST_document_design_rationale"
  - "NEVER_skip_usability_checks"

# Dependencies
dependencies:
  services:
    - "memory-service"
    - "event-bus"
  agents:
    - "agent-00-orchestrator"
    - "agent-04-pm"
    - "agent-05-ba"

# Events
event_subscriptions:
  - "agent.04.brd-created"
  - "workflow.ux-started"

event_pubs:
  - "agent.06.design-complete"
  - "agent.06.wireframe-created"

# Metadata
author: "Platform Team"
created_at: "2026-01-01"
last_updated: "2026-02-24"
