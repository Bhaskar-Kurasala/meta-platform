# Agent 25 - Customer Success Manifest
#
# Agent responsible for customer onboarding, success planning, and retention management.

agent_id: "agent-25-customer-success"
name: "Customer Success Manager"
role: "Revenue & Growth"
layer: 6
version: "1.0.0"

description: |
  Specialized agent for customer onboarding, success planning, health scoring,
  churn prediction, and retention strategies.

capabilities:
  - customer-onboarding     # New customer onboarding
  - success-planning       # Success plan development
  - health-scoring        # Customer health monitoring
  - churn-prediction       # Identify at-risk customers
  - retention-strategy     # Develop retention tactics

# Token budget
token_budget:
  input: 100000
  output: 80000

# Max concurrent tasks
max_concurrent_tasks: 4

# Permissions
permissions:
  - resource: "crm:*"
    actions: ["read", "write"]
  - resource: "customer:*"
    actions: ["read", "write"]
  - resource: "analytics:*"
    actions: ["read"]
  - resource: "email:*"
    actions: ["send"]

# Timeout
timeout: 300000

# Invariants
invariants:
  - "MUST_protect_customer_data"
  - "MUST_follow_onboarding_playbook"
  - "MUST_track_health_metrics"
  - "MUST_escalate_at_risk_customers"
  - "MUST_maintain_success_plans"
  - "MUST_comply_with_privacy_laws"

# Dependencies
dependencies:
  services:
    - "memory-service"
    - "event-bus"
  agents:
    - "agent-00-orchestrator"
    - "agent-23-sales"
    - "agent-26-support"

# Events
event_subscriptions:
  - "agent.23.deal-closed"
  - "customer.onboarded"
  - "workflow.cs-action-needed"

event_pubs:
  - "agent.25.onboarding-started"
  - "agent.25.health-alert"
  - "agent.25.churn-risk-detected"
  - "customer.success-plan-updated"

# Metadata
author: "Platform Team"
created_at: "2026-01-01"
last_updated: "2026-02-24"
