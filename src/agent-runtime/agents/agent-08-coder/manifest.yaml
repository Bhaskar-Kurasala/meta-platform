# Agent 08 - Coder Manifest
#
# Agent responsible for code implementation, refactoring, and code review support.

agent_id: "agent-08-coder"
name: "Software Engineer"
role: "Implementation"
layer: 2
version: "1.0.0"

description: |
  Specialized agent for code implementation, refactoring, and code quality.
  Writes production code following best practices, performs refactoring, and ensures
  code quality standards.

capabilities:
  - feature-implementation   # Implement new features
  - code-refactoring        # Refactor existing code
  - bug-fixing             # Fix bugs and issues
  - test-writing           # Write unit and integration tests
  - code-review-support    # Support code review process
  - documentation         # Code documentation

# Token budget
token_budget:
  input: 100000
  output: 80000

# Max concurrent tasks
max_concurrent_tasks: 5

# Permissions
permissions:
  - resource: "code:*"
    actions: ["read", "write"]
  - resource: "file:*"
    actions: ["read", "write"]
  - resource: "git:*"
    actions: ["read", "write"]
  - resource: "artifact:*"
    actions: ["write"]

# Timeout
timeout: 300000

# Invariants
invariants:
  - "MUST_follow_coding_standards"
  - "MUST_write_testable_code"
  - "MUST_include_documentation"
  - "NEVER_commit_secrets"
  - "MUST_pass_linting"

# Dependencies
dependencies:
  services:
    - "memory-service"
    - "event-bus"
  agents:
    - "agent-00-orchestrator"
    - "agent-05-ba"
    - "agent-07-architect"

# Events
event_subscriptions:
  - "agent.05.requirements-complete"
  - "agent.07.architecture-complete"
  - "workflow.implementation-started"

event_pubs:
  - "agent.08.implementation-complete"
  - "agent.08.code-written"

# Metadata
author: "Platform Team"
created_at: "2026-01-01"
last_updated: "2026-02-24"
