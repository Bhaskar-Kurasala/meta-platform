  # ─── Audit Logs ────────────────────────────────────────────────
  /api/v1/audit-logs:
    get:
      tags: [Users]
      summary: Query audit logs
      description: |
        Immutable audit trail. Only compliance_officer and admin roles can access.
        Results always sorted by timestamp descending.
      operationId: queryAuditLogs
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CursorParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: actor
          in: query
          schema: { type: string }
        - name: action
          in: query
          schema: { type: string }
        - name: resource_type
          in: query
          schema: { type: string }
        - name: since
          in: query
          schema: { type: string, format: date-time }
        - name: until
          in: query
          schema: { type: string, format: date-time }
      responses:
        '200':
          description: Paginated audit log entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      description: "See schemas/audit-log.schema.json"
                  pagination:
                    $ref: '#/components/schemas/PaginationMeta'
        '403':
          $ref: '#/components/responses/Forbidden'

  # ─── WebSocket (Real-time) ─────────────────────────────────────
  /ws/v1/live:
    get:
      tags: [Anomalies, Alerts]
      summary: Real-time anomaly and alert stream (WebSocket)
      description: |
        WebSocket endpoint for real-time dashboard updates.
        Authentication via JWT query parameter: `/ws/v1/live?token=<jwt>`
        
        **Messages sent by server:**
        - `{ "type": "anomaly", "data": <AnomalyEvent> }`
        - `{ "type": "alert", "data": <Alert> }`
        - `{ "type": "prediction", "data": <RiskPrediction> }`
        - `{ "type": "heartbeat", "timestamp": "<ISO-8601>" }`
        
        Heartbeat sent every 30 seconds. Client should reconnect if no message received in 60 seconds.
      operationId: liveStream
      security:
        - BearerAuth: []
      responses:
        '101':
          description: WebSocket upgrade successful
